<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="/sandbox/no-ff-webgpu.js"></script>
    <title>VectoJS — Spatial hash grid</title>
    <style>
      * {
        margin: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0e1a;
        font-family: Inter, system-ui, sans-serif;
      }
      #app {
        position: relative;
        width: 100%;
        height: 100%;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "@vectojs/core": "https://esm.sh/@vectojs/core@0.1.0"
        }
      }
    </script>
  </head>
  <body>
    <div id="app"><canvas id="canvas"></canvas></div>
    <script type="module">
      // Spatial hash grid, drawn live by VectoJS. A cursor orbits the grid; only
      // its cell and the eight neighbours are ever hit-tested — O(1), not O(N).
      import { Scene, Entity } from '@vectojs/core';
      import { mountDiagram, ctext, box, pulse } from '/sandbox/diagram-core.js';

      const app = document.getElementById('app');
      const canvas = document.getElementById('canvas');
      const DW = 720,
        DH = 450;

      const GX = 6,
        GY = 4,
        CELL = 60,
        GX0 = 180,
        GY0 = 132,
        TOTAL = GX * GY;

      const C = {
        idleFill: '#131a2b',
        idleStroke: '#26324c',
        neighFill: '#1a2b4a',
        neighStroke: '#3b5c8f',
        centerFill: '#24407a',
        centerStroke: '#38bdf8',
        cursor: '#38bdf8',
        title: '#e2e8f0',
        subtitle: '#7c8aa5',
        readout: '#8fd0f7',
        formula: '#64748b',
      };

      const clamp = (v, lo, hi) => (v < lo ? lo : v > hi ? hi : v);

      class SpatialHash extends Entity {
        constructor() {
          super();
          this.t = 0;
          this.width = DW;
          this.height = DH;
        }
        getBounds() {
          return { x: 0, y: 0, width: DW, height: DH };
        }
        update(dt) {
          this.t = (this.t + dt / 6200) % 1;
        }

        render(r) {
          ctext(r, 'Spatial Hash Grid', DW / 2, 64, '800 24px Inter, system-ui', 24, C.title);
          ctext(
            r,
            "a hover tests only the cursor's cell and its neighbours — O(1), not O(N)",
            DW / 2,
            92,
            '400 13px Inter, system-ui',
            13,
            C.subtitle,
          );

          // Cursor orbit (stays inside the grid bounds)
          const th = this.t * Math.PI * 2;
          const cx = GX0 + (GX * CELL) / 2 + 150 * Math.cos(th);
          const cy = GY0 + (GY * CELL) / 2 + 96 * Math.sin(th * 1.3);
          const ci = clamp(Math.floor((cx - GX0) / CELL), 0, GX - 1);
          const cj = clamp(Math.floor((cy - GY0) / CELL), 0, GY - 1);

          // Cells
          let tested = 0;
          for (let i = 0; i < GX; i++) {
            for (let j = 0; j < GY; j++) {
              const x = GX0 + i * CELL;
              const y = GY0 + j * CELL;
              const isCenter = i === ci && j === cj;
              const isNeigh = Math.abs(i - ci) <= 1 && Math.abs(j - cj) <= 1 && !isCenter;
              if (isCenter || isNeigh) tested++;
              const fill = isCenter ? C.centerFill : isNeigh ? C.neighFill : C.idleFill;
              const stroke = isCenter ? C.centerStroke : isNeigh ? C.neighStroke : C.idleStroke;
              box(r, x + 2, y + 2, CELL - 4, CELL - 4, 6, fill, stroke, isCenter ? 2 : 1);
            }
          }

          // Cursor
          pulse(r, cx, cy, 7, C.cursor);

          // Live readout + hash function
          ctext(
            r,
            `cursor in cell (${ci}, ${cj})  —  ${tested} tested, ${TOTAL - tested} skipped`,
            DW / 2,
            402,
            '600 13.5px Inter, system-ui',
            13.5,
            C.readout,
          );
          ctext(
            r,
            'H(i,j) = (i·p1 ^ j·p2) mod M     ·     p1 = 73856093,  p2 = 19349663',
            DW / 2,
            428,
            '400 11.5px Inter, system-ui',
            11.5,
            C.formula,
          );
        }
      }

      mountDiagram(Scene, canvas, app, DW, DH, new SpatialHash());
    </script>
  </body>
</html>
