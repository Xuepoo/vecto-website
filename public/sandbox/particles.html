<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="/sandbox/no-ff-webgpu.js"></script>
  <title>VectoJS — Particle System</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #050810; }
    #app { position: relative; width: 100%; height: 100%; }
    canvas { display: block; width: 100%; height: 100%; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "@vectojs/core": "https://esm.sh/@vectojs/core@0.1.0",
      "@vectojs/ui": "https://esm.sh/@vectojs/ui@0.1.0"
    }
  }
  </script>
</head>
<body>
  <div id="app"><canvas id="canvas"></canvas></div>
  <script type="module">
  import { Scene, ComputeParticleEntity } from '@vectojs/core';

  const app = document.getElementById('app');
  const canvas = document.getElementById('canvas');

  function setSize() {
    canvas.width = app.offsetWidth;
    canvas.height = app.offsetHeight;
  }
  setSize();

  // WebGPU (Chrome) runs the sim on the GPU — huge throughput. Where it's absent
  // (Firefox here: no-ff-webgpu.js hides navigator.gpu to avoid the GPU-process
  // crash) we fall back to the CPU step with far fewer particles + a lower cap so
  // it stays smooth.
  const canGPU = !!navigator.gpu;
  const MAX_PARTICLES = canGPU ? 2500 : 500;

  const scene = new Scene(canvas, {
    renderMode: 'always',
    pointBackend: 'webgl',
    maxFPS: canGPU ? 60 : 45,
  });

  const particles = new ComputeParticleEntity({
    maxParticles: MAX_PARTICLES,
    // Chrome/WebGPU: omit the backend so it defaults to auto (WebGPU when available,
    // CPU fallback) — exactly like the Nexus demo. Firefox: force CPU to dodge the
    // GPU-process crash seen on some Linux setups.
    ...(canGPU ? {} : { particleBackend: 'cpu' }),
    springK: 0.04,
    damping: 0.94,
    bounceDamping: 0.4,
    maxVelocity: 400,
    size: 2.5,
    color: '#6366f1',
    pointerEvents: true,
  });

  scene.add(particles);

  function fit() {
    // Logical (CSS) px — canvas.width is the DPR-scaled backing buffer after
    // scene.resize(); spawning particles in those coords scatters half of them
    // off-screen and makes the field drift with browser zoom.
    const W = app.offsetWidth, H = app.offsetHeight;
    scene.resize(W, H);
    particles.initRandomParticles(W, H);
  }

  window.addEventListener('resize', fit);
  // Defer to next rAF so the iframe's layout has settled before reading dimensions.
  requestAnimationFrame(fit);

  // Pause the continuous sim when it isn't on screen — a particle loop running on
  // the main thread while you scroll the docs is the main cause of janky scrolling.
  let running = false;
  const setRunning = (on) => {
    if (on === running) return;
    running = on;
    if (on) scene.start();
    else scene.stop();
  };
  setRunning(true);

  // Same-origin iframe: observe our own <iframe> against the PARENT viewport, so
  // the sim stops the moment it scrolls out of the docs page (not just on tab-hide).
  try {
    const frame = window.frameElement;
    if (frame && window.parent && window.parent.IntersectionObserver) {
      new window.parent.IntersectionObserver(
        (entries) => setRunning(entries[entries.length - 1].isIntersecting),
        { threshold: 0.01 },
      ).observe(frame);
    }
  } catch {
    /* cross-origin parent — the visibility listener below still applies */
  }
  document.addEventListener('visibilitychange', () => setRunning(!document.hidden));

  canvas.addEventListener('click', (e) => {
    particles.triggerExplosion(e.offsetX, e.offsetY, 300);
  });
  </script>
</body>
</html>
