<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VectoUI — Particle System</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    body { background: #050810; overflow: hidden; }
    #app { position: relative; width: 100vw; height: 100vh; }
    canvas { display: block; width: 100%; height: 100%; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "@vecto-ui/core": "https://esm.sh/@vecto-ui/core@0.9.2",
      "@vecto-ui/ui": "https://esm.sh/@vecto-ui/ui@0.4.2"
    }
  }
  </script>
</head>
<body>
  <div id="app"><canvas id="canvas"></canvas></div>
  <script type="module">
  import { Scene, ComputeParticleEntity } from '@vecto-ui/core';

  const app = document.getElementById('app');
  const canvas = document.getElementById('canvas');

  function setSize() {
    canvas.width = app.offsetWidth;
    canvas.height = app.offsetHeight;
  }
  setSize();

  const scene = new Scene(canvas, {
    particleBackend: 'auto',
    pointBackend: 'webgl',
    maxFPS: 60,
  });

  const particles = new ComputeParticleEntity({
    maxParticles: 8000,
    springK: 0.04,
    damping: 0.94,
    bounceDamping: 0.4,
    maxVelocity: 400,
    size: 2.5,
    color: '#6366f1',
    pointerEvents: true,
  });

  scene.add(particles);
  scene.start();

  scene.resize(canvas.width, canvas.height);
  particles.initRandomParticles(canvas.width, canvas.height);

  window.addEventListener('resize', () => {
    setSize();
    scene.resize(canvas.width, canvas.height);
    particles.initRandomParticles(canvas.width, canvas.height);
  });

  canvas.addEventListener('click', (e) => {
    particles.triggerExplosion(e.offsetX, e.offsetY, 300);
  });
  </script>
</body>
</html>
