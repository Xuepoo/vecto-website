<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VectoUI — Getting Started</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0e1a; font-family: Inter, system-ui, sans-serif; }
    #app { position: relative; width: 100%; height: 100%; }
    canvas { display: block; width: 100%; height: 100%; }
    #err { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
           padding: 1.5rem; color: #f87171; font-size: 13px; white-space: pre-wrap; display: none; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "@vecto-ui/core": "https://esm.sh/@vecto-ui/core@0.9.2",
      "@vecto-ui/ui": "https://esm.sh/@vecto-ui/ui@0.4.2"
    }
  }
  </script>
</head>
<body>
  <div id="app"><canvas id="canvas"></canvas></div>
  <div id="err"></div>
  <script type="module">
  import { Scene } from '@vecto-ui/core';
  import { Button, Text, Toggle, Slider, Stack } from '@vecto-ui/ui';

  const app = document.getElementById('app');
  const canvas = document.getElementById('canvas');

  function setSize() {
    canvas.width = app.offsetWidth;
    canvas.height = app.offsetHeight;
  }
  setSize();

  const scene = new Scene(canvas, { renderMode: 'onDemand', maxFPS: 60 });

  // --- Counter ---
  let count = 0;
  const countLabel = new Text('Clicks: 0', { font: '600 18px Inter, system-ui', color: '#f8fafc' });

  const btn = new Button('Click me', { width: 160, height: 40 });
  btn.on('click', () => {
    count++;
    countLabel.setText(`Clicks: ${count}`);
    scene.markDirty();
  });

  // --- Toggle ---
  const darkToggle = new Toggle({ label: 'Dark mode', checked: true });

  // --- Slider ---
  const slider = new Slider({ min: 0, max: 100, value: 50, width: 200 });

  // --- Stack ---
  const stack = new Stack({ direction: 'vertical', gap: 20 });
  stack.add(countLabel);
  stack.add(btn);
  stack.add(darkToggle);
  stack.add(slider);
  scene.add(stack);

  function layout() {
    // Use logical (CSS) px — canvas.width is the DPR-scaled backing buffer after
    // scene.resize(), which would push content off-center and vary with zoom.
    const w = app.offsetWidth, h = app.offsetHeight;
    stack.setPosition(
      Math.max(20, (w - 220) / 2),
      Math.max(20, (h - 200) / 2),
    );
    scene.markDirty();
  }
  window.addEventListener('resize', () => {
    setSize();
    scene.resize(canvas.width, canvas.height);
    layout();
  });

  scene.start();

  requestAnimationFrame(() => {
    setSize();
    scene.resize(canvas.width, canvas.height);
    layout();
  });
  </script>
</body>
</html>
