<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="/sandbox/no-ff-webgpu.js"></script>
  <title>VectoJS — Events</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0e1a; }
    #app { position: relative; width: 100%; height: 100%; }
    canvas { display: block; width: 100%; height: 100%; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "@vectojs/core": "https://esm.sh/@vectojs/core@0.1.0",
      "@vectojs/ui": "https://esm.sh/@vectojs/ui@0.1.0"
    }
  }
  </script>
</head>
<body>
  <div id="app"><canvas id="canvas"></canvas></div>
  <script type="module">
  import { Scene, Entity } from '@vectojs/core';

  const app = document.getElementById('app');
  const canvas = document.getElementById('canvas');

  function setSize() {
    canvas.width = app.offsetWidth;
    canvas.height = app.offsetHeight;
  }
  setSize();

  const scene = new Scene(canvas, { renderMode: 'onDemand', maxFPS: 60 });

  class HoverCard extends Entity {
    constructor(label, accent) {
      super();
      this.label = label;
      this.accent = accent;
      this.clickCount = 0;
      this.hovered = false;
      this.width = 150;
      this.height = 100;
      this.interactive = true;

      this.on('hover', () => {
        this.hovered = true;
        this.animate({ scaleX: 1.06, scaleY: 1.06 }, 150);
      });

      this.on('pointerleave', () => {
        this.hovered = false;
        this.animate({ scaleX: 1, scaleY: 1 }, 150);
      });

      this.on('click', () => {
        this.clickCount++;
        this.animate({ scaleX: 0.93, scaleY: 0.93 }, 80)
            .animate({ scaleX: 1.06, scaleY: 1.06 }, 80)
            .animate({ scaleX: 1, scaleY: 1 }, 80);
      });
    }

    getA11yAttributes() {
      return { tag: 'button', role: 'button', label: this.label };
    }

    isPointInside(gx, gy) {
      const p = this.getGlobalPosition();
      return gx >= p.x && gx <= p.x + this.width && gy >= p.y && gy <= p.y + this.height;
    }

    getBounds() {
      return { x: 0, y: 0, width: this.width, height: this.height };
    }

    render(renderer) {
      renderer.beginPath();
      renderer.roundRect(0, 0, this.width, this.height, 14);
      renderer.fill(this.hovered ? this.accent + '30' : 'rgba(15,23,42,0.9)');
      renderer.stroke(this.hovered ? this.accent : 'rgba(255,255,255,0.08)', 1.5);

      renderer.fillText(this.label, 16, 22, '600 15px Inter, system-ui', '#f8fafc');
      renderer.fillText(
        `${this.clickCount} click${this.clickCount !== 1 ? 's' : ''}`,
        16, 52, '400 13px Inter, system-ui', '#94a3b8',
      );

      if (this.hovered) {
        renderer.beginPath();
        renderer.arc(this.width - 22, this.height / 2, 6, 0, Math.PI * 2);
        renderer.fill(this.accent);
      }
    }
  }

  const colors = ['#6366f1', '#06b6d4', '#10b981'];
  const labels = ['Hover me', 'Click me', 'Try me'];
  const cards = [];

  function layout() {
    // Logical (CSS) px — not the DPR-scaled canvas.width that scene.resize() sets.
    const W = app.offsetWidth, H = app.offsetHeight;
    const gap = 20;
    const cardW = 150;
    const total = cards.length * cardW + (cards.length - 1) * gap;
    const startX = (W - total) / 2;
    const y = (H - 100) / 2;
    cards.forEach((c, i) => c.setPosition(startX + i * (cardW + gap), y));
  }

  for (let i = 0; i < 3; i++) {
    const card = new HoverCard(labels[i], colors[i]);
    scene.add(card);
    cards.push(card);
  }
  window.addEventListener('resize', () => {
    setSize();
    scene.resize(canvas.width, canvas.height);
    layout();
    scene.markDirty();
  });

  scene.start();

  requestAnimationFrame(() => {
    setSize();
    scene.resize(canvas.width, canvas.height);
    layout();
    scene.markDirty();
  });
  </script>
</body>
</html>
