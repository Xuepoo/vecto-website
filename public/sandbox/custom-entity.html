<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="/sandbox/no-ff-webgpu.js"></script>
  <title>VectoJS — Custom Entity</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0e1a; }
    #app { position: relative; width: 100%; height: 100%; }
    canvas { display: block; width: 100%; height: 100%; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "@vectojs/core": "https://esm.sh/@vectojs/core@0.1.0",
      "@vectojs/ui": "https://esm.sh/@vectojs/ui@0.1.0"
    }
  }
  </script>
</head>
<body>
  <div id="app"><canvas id="canvas"></canvas></div>
  <script type="module">
  import { Scene, Entity } from '@vectojs/core';
  import { Button, Stack } from '@vectojs/ui';

  const app = document.getElementById('app');
  const canvas = document.getElementById('canvas');
  function setSize() { canvas.width = app.offsetWidth; canvas.height = app.offsetHeight; }
  setSize();

  const scene = new Scene(canvas, { renderMode: 'onDemand', maxFPS: 60 });

  class GaugeWidget extends Entity {
    constructor(label, accent) {
      super();
      this.label = label;
      this.accent = accent;
      this._value = 0;
      this._display = 0;
      this.min = 0;
      this.max = 100;
      this.size = 180;
      this.width = 180;
      this.height = 180;
      this.interactive = true;
    }

    setValue(v) {
      this._value = Math.max(this.min, Math.min(this.max, v));
      this.animate({ _display: this._value }, 700);
    }

    getA11yAttributes() {
      return {
        role: 'meter',
        label: this.label,
        value: String(Math.round(this._value)),
        valuemin: String(this.min),
        valuemax: String(this.max),
      };
    }

    isPointInside(gx, gy) {
      const p = this.getGlobalPosition();
      return gx >= p.x && gx <= p.x + this.width && gy >= p.y && gy <= p.y + this.height;
    }

    getBounds() { return { x: 0, y: 0, width: this.width, height: this.height }; }

    render(renderer) {
      const s = this.size;
      const cx = s / 2;
      const cy = s / 2 + s * 0.044;
      const r = s * 0.355;
      const trackW = Math.max(6, s * 0.055);
      const startAngle = Math.PI * 0.75;
      const sweep = Math.PI * 1.5;
      const progress = (this._display - this.min) / (this.max - this.min);
      const valSize = Math.round(s * 0.166);
      const lblSize = Math.max(10, Math.round(s * 0.072));

      renderer.beginPath();
      renderer.arc(cx, cy, r, startAngle, startAngle + sweep);
      renderer.stroke('rgba(255,255,255,0.08)', trackW);

      if (progress > 0.001) {
        renderer.beginPath();
        renderer.arc(cx, cy, r, startAngle, startAngle + sweep * progress);
        renderer.stroke(this.accent, trackW);
      }

      renderer.fillText(
        Math.round(this._display).toString(),
        cx - valSize * 0.6, cy - s * 0.055,
        `bold ${valSize}px Inter, system-ui`,
        '#f8fafc',
      );
      renderer.fillText(
        this.label,
        cx - lblSize * 1.7, cy + s * 0.1,
        `${lblSize}px Inter, system-ui`,
        '#64748b',
      );
    }
  }

  const gauges = [
    new GaugeWidget('CPU', '#6366f1'),
    new GaugeWidget('RAM', '#06b6d4'),
    new GaugeWidget('GPU', '#10b981'),
  ];

  function layout() {
    gauges.forEach(g => scene.remove(g));
    // Logical (CSS) px — not the DPR-scaled canvas.width that scene.resize() sets.
    const W = app.offsetWidth, H = app.offsetHeight;
    const gap = 12;
    const available = Math.max(120, W - 24);
    const gw = Math.min(180, Math.max(100, Math.floor((available - gap * (gauges.length - 1)) / gauges.length)));
    const total = gauges.length * gw + (gauges.length - 1) * gap;
    const sx = Math.max(0, (W - total) / 2);
    const sy = Math.max(8, (H - gw - 20) / 2);
    gauges.forEach((g, i) => {
      g.size = gw;
      g.width = gw;
      g.height = gw;
      g.setPosition(sx + i * (gw + gap), sy);
      scene.add(g);
    });
  }

  function randomize() {
    gauges.forEach(g => g.setValue(Math.random() * 100));
    scene.markDirty();
  }

  layout();

  const btn = new Button('Randomize', { width: 140, height: 38 });
  btn.on('click', randomize);
  scene.add(btn);

  function placeBtn() {
    btn.setPosition((app.offsetWidth - 140) / 2, app.offsetHeight - 70);
  }
  placeBtn();

  window.addEventListener('resize', () => {
    setSize();
    scene.resize(canvas.width, canvas.height);
    layout();
    placeBtn();
    scene.markDirty();
  });

  scene.start();

  requestAnimationFrame(() => {
    setSize();
    scene.resize(canvas.width, canvas.height);
    layout();
    placeBtn();
    randomize();
  });
  </script>
</body>
</html>
