  <!-- Text -->
  <line x1="55" y1="195" x2="55" y2="212" stroke="#38bdf8" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="20" y="214" width="70" height="30" rx="6" fill="#111827" stroke="#38bdf8" stroke-width="1"/>
  <text x="55" y="234" fill="#93c5fd" font-size="11" font-weight="500" text-anchor="middle">Text</text>

