  <rect x="140" y="214" width="70" height="30" rx="6" fill="#111827" stroke="#38bdf8" stroke-width="1"/>
  <text x="175" y="234" fill="#93c5fd" font-size="11" font-weight="500" text-anchor="middle">Link</text>

