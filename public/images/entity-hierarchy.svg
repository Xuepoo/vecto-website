<svg viewBox="0 0 960 410" xmlns="http://www.w3.org/2000/svg" font-family="'Inter', system-ui, sans-serif">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#6366f1"/>
    </marker>
    <marker id="arrb" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#38bdf8"/>
    </marker>
  </defs>

  <rect width="960" height="410" fill="#0a0e1a" rx="16"/>
  <text x="480" y="30" fill="#8b949e" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="1.5">CLASS HIERARCHY — @vectojs/core + @vectojs/ui</text>

  <!-- Entity (abstract) -->
  <rect x="380" y="46" width="200" height="42" rx="8" fill="#1a1f35" stroke="#6366f1" stroke-width="2"/>
  <text x="480" y="64" fill="#a5b4fc" font-size="12" font-weight="700" text-anchor="middle">Entity</text>
  <text x="480" y="80" fill="#6b7280" font-size="10" text-anchor="middle">abstract · @vectojs/core</text>

  <!-- Entity → splitter -->
  <line x1="480" y1="88" x2="480" y2="104" stroke="#6366f1" stroke-width="1.5"/>
  <line x1="200" y1="104" x2="800" y2="104" stroke="#6366f1" stroke-width="1.5"/>

  <!-- Three direct subclasses -->
  <!-- UIComponent (left) -->
  <line x1="200" y1="104" x2="200" y2="120" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="104" y="122" width="192" height="42" rx="8" fill="#1a1f35" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="200" y="140" fill="#7dd3fc" font-size="12" font-weight="600" text-anchor="middle">UIComponent</text>
  <text x="200" y="156" fill="#6b7280" font-size="9.5" text-anchor="middle">@vectojs/ui · isPointInside (AABB)</text>

  <!-- ComputeParticleEntity (center) -->
  <line x1="480" y1="104" x2="480" y2="120" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="388" y="122" width="184" height="42" rx="8" fill="#1a1f35" stroke="#10b981" stroke-width="1.5"/>
  <text x="480" y="140" fill="#6ee7b7" font-size="12" font-weight="600" text-anchor="middle">ComputeParticleEntity</text>
  <text x="480" y="156" fill="#6b7280" font-size="9.5" text-anchor="middle">WebGPU / CPU particle sim</text>

  <!-- DOMPortalEntity (right) -->
  <line x1="800" y1="104" x2="800" y2="120" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="720" y="122" width="160" height="42" rx="8" fill="#1a1f35" stroke="#f59e0b" stroke-width="1.3"/>
  <text x="800" y="140" fill="#fcd34d" font-size="12" font-weight="600" text-anchor="middle">DOMPortalEntity</text>
  <text x="800" y="156" fill="#6b7280" font-size="9.5" text-anchor="middle">embed native DOM</text>

  <!-- UIComponent → leaf rail -->
  <line x1="200" y1="164" x2="200" y2="184" stroke="#38bdf8" stroke-width="1.5"/>
  <line x1="88" y1="184" x2="872" y2="184" stroke="#38bdf8" stroke-width="1.2"/>

  <!-- Row 1 leaves -->
  <!-- centers: 88 200 312 424 536 648 760 872 ; box w=96 (x=center-48), h=34 -->
  <g>
    <line x1="88"  y1="184" x2="88"  y2="198" stroke="#38bdf8" stroke-width="1" marker-end="url(#arrb)"/>
    <rect x="40"  y="200" width="96" height="34" rx="6" fill="#111827" stroke="#38bdf8" stroke-width="1"/>
    <text x="88"  y="222" fill="#93c5fd" font-size="11" text-anchor="middle">Text</text>

    <line x1="200" y1="184" x2="200" y2="198" stroke="#38bdf8" stroke-width="1" marker-end="url(#arrb)"/>
    <rect x="152" y="200" width="96" height="34" rx="6" fill="#111827" stroke="#38bdf8" stroke-width="1"/>
    <text x="200" y="222" fill="#93c5fd" font-size="11" text-anchor="middle">Button</text>

    <line x1="312" y1="184" x2="312" y2="198" stroke="#38bdf8" stroke-width="1" marker-end="url(#arrb)"/>
    <rect x="264" y="200" width="96" height="34" rx="6" fill="#111827" stroke="#38bdf8" stroke-width="1"/>
    <text x="312" y="222" fill="#93c5fd" font-size="11" text-anchor="middle">Link</text>

    <line x1="424" y1="184" x2="424" y2="198" stroke="#38bdf8" stroke-width="1" marker-end="url(#arrb)"/>
    <rect x="376" y="200" width="96" height="34" rx="6" fill="#111827" stroke="#38bdf8" stroke-width="1"/>
    <text x="424" y="222" fill="#93c5fd" font-size="11" text-anchor="middle">Card</text>

    <line x1="536" y1="184" x2="536" y2="198" stroke="#38bdf8" stroke-width="1" marker-end="url(#arrb)"/>
    <rect x="488" y="200" width="96" height="34" rx="6" fill="#111827" stroke="#38bdf8" stroke-width="1"/>
    <text x="536" y="222" fill="#93c5fd" font-size="11" text-anchor="middle">Input</text>

    <line x1="648" y1="184" x2="648" y2="198" stroke="#38bdf8" stroke-width="1" marker-end="url(#arrb)"/>
    <rect x="600" y="200" width="96" height="34" rx="6" fill="#111827" stroke="#38bdf8" stroke-width="1"/>
    <text x="648" y="222" fill="#93c5fd" font-size="11" text-anchor="middle">TextArea</text>

    <line x1="760" y1="184" x2="760" y2="198" stroke="#38bdf8" stroke-width="1" marker-end="url(#arrb)"/>
    <rect x="712" y="200" width="96" height="34" rx="6" fill="#111827" stroke="#38bdf8" stroke-width="1"/>
    <text x="760" y="222" fill="#93c5fd" font-size="11" text-anchor="middle">Toggle</text>

    <line x1="872" y1="184" x2="872" y2="198" stroke="#38bdf8" stroke-width="1" marker-end="url(#arrb)"/>
    <rect x="824" y="200" width="96" height="34" rx="6" fill="#111827" stroke="#38bdf8" stroke-width="1"/>
    <text x="872" y="222" fill="#93c5fd" font-size="11" text-anchor="middle">Checkbox</text>
  </g>

  <!-- Row 2 leaves (hang under row 1, same columns) -->
  <g>
    <line x1="88"  y1="234" x2="88"  y2="248" stroke="#38bdf8" stroke-width="0.9"/>
    <rect x="40"  y="250" width="96" height="34" rx="6" fill="#111827" stroke="#38bdf8" stroke-width="0.8"/>
    <text x="88"  y="272" fill="#93c5fd" font-size="11" text-anchor="middle">Slider</text>

    <line x1="200" y1="234" x2="200" y2="248" stroke="#38bdf8" stroke-width="0.9"/>
    <rect x="152" y="250" width="96" height="34" rx="6" fill="#111827" stroke="#38bdf8" stroke-width="0.8"/>
    <text x="200" y="272" fill="#93c5fd" font-size="11" text-anchor="middle">Dropdown</text>

    <line x1="312" y1="234" x2="312" y2="248" stroke="#38bdf8" stroke-width="0.9"/>
    <rect x="264" y="250" width="96" height="34" rx="6" fill="#111827" stroke="#38bdf8" stroke-width="0.8"/>
    <text x="312" y="272" fill="#93c5fd" font-size="11" text-anchor="middle">Modal</text>

    <line x1="424" y1="234" x2="424" y2="248" stroke="#38bdf8" stroke-width="0.9"/>
    <rect x="376" y="250" width="96" height="34" rx="6" fill="#111827" stroke="#38bdf8" stroke-width="0.8"/>
    <text x="424" y="272" fill="#93c5fd" font-size="11" text-anchor="middle">ScrollView</text>

    <line x1="536" y1="234" x2="536" y2="248" stroke="#38bdf8" stroke-width="0.9"/>
    <rect x="488" y="250" width="96" height="34" rx="6" fill="#111827" stroke="#38bdf8" stroke-width="0.8"/>
    <text x="536" y="272" fill="#93c5fd" font-size="11" text-anchor="middle">Stack</text>

    <line x1="648" y1="234" x2="648" y2="248" stroke="#38bdf8" stroke-width="0.9"/>
    <rect x="600" y="250" width="96" height="34" rx="6" fill="#111827" stroke="#38bdf8" stroke-width="0.8"/>
    <text x="648" y="272" fill="#93c5fd" font-size="11" text-anchor="middle">Flow</text>

    <line x1="760" y1="234" x2="760" y2="248" stroke="#38bdf8" stroke-width="0.9"/>
    <rect x="712" y="250" width="96" height="34" rx="6" fill="#111827" stroke="#38bdf8" stroke-width="0.8"/>
    <text x="760" y="272" fill="#93c5fd" font-size="11" text-anchor="middle">RichText</text>

    <line x1="872" y1="234" x2="872" y2="248" stroke="#38bdf8" stroke-width="0.9"/>
    <rect x="824" y="250" width="96" height="34" rx="6" fill="#111827" stroke="#38bdf8" stroke-width="0.8"/>
    <text x="872" y="272" fill="#93c5fd" font-size="10.5" text-anchor="middle">Image / Table</text>
  </g>

  <!-- Legend -->
  <rect x="40" y="300" width="880" height="86" rx="8" fill="#0d1525" stroke="#1e2d4a" stroke-width="1"/>
  <text x="58" y="322" fill="#8b949e" font-size="10.5" font-weight="600">KEY ENTITY PROPERTIES (all classes inherit)</text>
  <text x="58" y="342" fill="#4b5563" font-size="10.5">x, y — local position · scaleX, scaleY — local scale · rotation — radians · opacity — [0,1]</text>
  <text x="58" y="360" fill="#4b5563" font-size="10.5">interactive — enables shadow DOM node · clipChildren — clip to box · a11yFullViewport — full-screen hit area</text>
  <text x="58" y="378" fill="#4b5563" font-size="10.5">animate(props, ms) — queue tween · on / off / emit / dispatchEvent — events · getGlobalPosition() — world coords</text>
</svg>
