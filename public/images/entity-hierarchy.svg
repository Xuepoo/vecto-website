<svg viewBox="0 0 820 420" xmlns="http://www.w3.org/2000/svg" font-family="'Inter', system-ui, sans-serif">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#6366f1"/>
    </marker>
  </defs>

  <rect width="820" height="420" fill="#0a0e1a" rx="16"/>
  <text x="410" y="32" fill="#8b949e" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="1.5">CLASS HIERARCHY — @vecto-ui/core + @vecto-ui/ui</text>

  <!-- Entity (abstract) -->
  <rect x="310" y="48" width="200" height="40" rx="8" fill="#1a1f35" stroke="#6366f1" stroke-width="2"/>
  <text x="410" y="65" fill="#a5b4fc" font-size="12" font-weight="700" text-anchor="middle">Entity</text>
  <text x="410" y="80" fill="#6b7280" font-size="10" text-anchor="middle">abstract · @vecto-ui/core</text>

  <!-- Vertical from Entity down -->
  <line x1="410" y1="88" x2="410" y2="110" stroke="#6366f1" stroke-width="1.5"/>
  <!-- Horizontal splitter at y=110 -->
  <line x1="160" y1="110" x2="660" y2="110" stroke="#6366f1" stroke-width="1.5"/>

  <!-- UIComponent branch (left-center) -->
  <line x1="260" y1="110" x2="260" y2="128" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="160" y="130" width="200" height="38" rx="8" fill="#1a1f35" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="260" y="147" fill="#7dd3fc" font-size="12" font-weight="600" text-anchor="middle">UIComponent</text>
  <text x="260" y="161" fill="#6b7280" font-size="10" text-anchor="middle">@vecto-ui/ui · isPointInside (AABB)</text>

  <!-- ComputeParticleEntity branch (right) -->
  <line x1="560" y1="110" x2="560" y2="128" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="470" y="130" width="180" height="38" rx="8" fill="#1a1f35" stroke="#10b981" stroke-width="1.5"/>
  <text x="560" y="147" fill="#6ee7b7" font-size="12" font-weight="600" text-anchor="middle">ComputeParticle</text>
  <text x="560" y="161" fill="#6b7280" font-size="10" text-anchor="middle">WebGPU / CPU particle sim</text>

  <!-- DOMPortalEntity -->
  <line x1="700" y1="110" x2="700" y2="128" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="660" y="130" width="150" height="38" rx="8" fill="#1a1f35" stroke="#f59e0b" stroke-width="1"/>
  <text x="735" y="147" fill="#fcd34d" font-size="11" font-weight="600" text-anchor="middle">DOMPortalEntity</text>
  <text x="735" y="161" fill="#6b7280" font-size="10" text-anchor="middle">embed native DOM</text>

  <!-- UIComponent children — vertical line down -->
  <line x1="260" y1="168" x2="260" y2="195" stroke="#38bdf8" stroke-width="1.5"/>
  <!-- Horizontal spreader -->
  <line x1="45" y1="195" x2="475" y2="195" stroke="#38bdf8" stroke-width="1"/>

