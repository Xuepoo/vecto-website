  <rect x="200" y="214" width="70" height="30" rx="6" fill="#111827" stroke="#38bdf8" stroke-width="1"/>
  <text x="235" y="234" fill="#93c5fd" font-size="11" font-weight="500" text-anchor="middle">Card</text>

  <!-- Input -->
  <line x1="295" y1="195" x2="295" y2="212" stroke="#38bdf8" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="260" y="214" width="70" height="30" rx="6" fill="#111827" stroke="#38bdf8" stroke-width="1"/>
  <text x="295" y="234" fill="#93c5fd" font-size="11" font-weight="500" text-anchor="middle">Input</text>

  <!-- TextArea -->
  <line x1="355" y1="195" x2="355" y2="212" stroke="#38bdf8" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="320" y="214" width="70" height="30" rx="6" fill="#111827" stroke="#38bdf8" stroke-width="1"/>
  <text x="355" y="234" fill="#93c5fd" font-size="11" font-weight="500" text-anchor="middle">TextArea</text>

  <!-- Toggle -->
  <line x1="415" y1="195" x2="415" y2="212" stroke="#38bdf8" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="380" y="214" width="70" height="30" rx="6" fill="#111827" stroke="#38bdf8" stroke-width="1"/>
  <text x="415" y="234" fill="#93c5fd" font-size="11" font-weight="500" text-anchor="middle">Toggle</text>

  <!-- Checkbox -->
  <line x1="465" y1="195" x2="465" y2="212" stroke="#38bdf8" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="450" y="214" width="80" height="30" rx="6" fill="#111827" stroke="#38bdf8" stroke-width="1"/>
  <text x="490" y="234" fill="#93c5fd" font-size="11" font-weight="500" text-anchor="middle">Checkbox</text>

  <!-- Row 2: more components -->
  <line x1="55" y1="244" x2="55" y2="261" stroke="#38bdf8" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="20" y="262" width="70" height="30" rx="6" fill="#111827" stroke="#38bdf8" stroke-width="0.8"/>
  <text x="55" y="282" fill="#93c5fd" font-size="11" font-weight="500" text-anchor="middle">Slider</text>

  <line x1="115" y1="244" x2="115" y2="261" stroke="#38bdf8" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="80" y="262" width="70" height="30" rx="6" fill="#111827" stroke="#38bdf8" stroke-width="0.8"/>
  <text x="115" y="282" fill="#93c5fd" font-size="11" font-weight="500" text-anchor="middle">Dropdown</text>

  <line x1="175" y1="244" x2="175" y2="261" stroke="#38bdf8" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="140" y="262" width="70" height="30" rx="6" fill="#111827" stroke="#38bdf8" stroke-width="0.8"/>
  <text x="175" y="282" fill="#93c5fd" font-size="11" font-weight="500" text-anchor="middle">Modal</text>

  <line x1="235" y1="244" x2="235" y2="261" stroke="#38bdf8" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="200" y="262" width="70" height="30" rx="6" fill="#111827" stroke="#38bdf8" stroke-width="0.8"/>
  <text x="235" y="282" fill="#93c5fd" font-size="11" font-weight="500" text-anchor="middle">ScrollView</text>

  <line x1="295" y1="244" x2="295" y2="261" stroke="#38bdf8" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="260" y="262" width="70" height="30" rx="6" fill="#111827" stroke="#38bdf8" stroke-width="0.8"/>
  <text x="295" y="282" fill="#93c5fd" font-size="11" font-weight="500" text-anchor="middle">Stack</text>

  <line x1="355" y1="244" x2="355" y2="261" stroke="#38bdf8" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="320" y="262" width="70" height="30" rx="6" fill="#111827" stroke="#38bdf8" stroke-width="0.8"/>
  <text x="355" y="282" fill="#93c5fd" font-size="11" font-weight="500" text-anchor="middle">Flow</text>

  <line x1="415" y1="244" x2="415" y2="261" stroke="#38bdf8" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="380" y="262" width="70" height="30" rx="6" fill="#111827" stroke="#38bdf8" stroke-width="0.8"/>
  <text x="415" y="282" fill="#93c5fd" font-size="11" font-weight="500" text-anchor="middle">RichText</text>

  <line x1="475" y1="244" x2="475" y2="261" stroke="#38bdf8" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="450" y="262" width="80" height="30" rx="6" fill="#111827" stroke="#38bdf8" stroke-width="0.8"/>
  <text x="490" y="282" fill="#93c5fd" font-size="11" font-weight="500" text-anchor="middle">Image/Table</text>

  <!-- Legend -->
  <rect x="20" y="330" width="780" height="72" rx="8" fill="#0d1525" stroke="#1e2d4a" stroke-width="1"/>
  <text x="40" y="350" fill="#8b949e" font-size="10" font-weight="600">KEY ENTITY PROPERTIES (all classes inherit)</text>
  <text x="40" y="368" fill="#4b5563" font-size="10">x, y — local position · scaleX, scaleY — local scale · rotation — radians · opacity — [0,1]</text>
  <text x="40" y="382" fill="#4b5563" font-size="10">interactive — enables shadow DOM node · clipChildren — clip to box · a11yFullViewport — full-screen hit area</text>
  <text x="40" y="396" fill="#4b5563" font-size="10">animate(props, ms) — queue tween · on/off/emit/dispatchEvent — event system · getGlobalPosition() — world-space coords</text>
</svg>
