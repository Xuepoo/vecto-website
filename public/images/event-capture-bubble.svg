<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 340" width="560" height="340" font-family="Inter, system-ui, sans-serif">
  <!-- Background -->
  <rect width="560" height="340" rx="12" fill="#0f172a"/>

  <!-- Tree nodes -->
  <!-- Scene root -->
  <rect x="200" y="20" width="160" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="280" y="46" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="500">Scene root</text>

  <!-- Card -->
  <rect x="200" y="105" width="160" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="280" y="131" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="500">Card</text>

  <!-- Button (target) -->
  <rect x="196" y="190" width="168" height="44" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="2"/>
  <text x="280" y="211" text-anchor="middle" fill="#a5b4fc" font-size="14" font-weight="600">Button</text>
  <text x="280" y="227" text-anchor="middle" fill="#6366f1" font-size="11">← target</text>

  <!-- Connector lines -->
  <line x1="280" y1="60" x2="280" y2="105" stroke="#334155" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="280" y1="145" x2="280" y2="190" stroke="#334155" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Capture phase arrow (down, blue) -->
  <line x1="188" y1="44" x2="188" y2="206" stroke="#3b82f6" stroke-width="2.5"/>
  <polygon points="188,212 183,200 193,200" fill="#3b82f6"/>
  <!-- Capture label -->
  <rect x="20" y="100" width="128" height="28" rx="6" fill="#1e3a5f"/>
  <text x="84" y="119" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="600">Capture phase</text>
  <line x1="148" y1="114" x2="184" y2="114" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Bubble phase arrow (up, orange) -->
  <line x1="372" y1="206" x2="372" y2="44" stroke="#f97316" stroke-width="2.5"/>
  <polygon points="372,38 367,50 377,50" fill="#f97316"/>
  <!-- Bubble label -->
  <rect x="412" y="100" width="122" height="28" rx="6" fill="#431407"/>
  <text x="473" y="119" text-anchor="middle" fill="#fdba74" font-size="13" font-weight="600">Bubble phase</text>
  <line x1="376" y1="114" x2="408" y2="114" stroke="#f97316" stroke-width="1.5"/>

  <!-- Direction labels alongside arrows -->
  <text x="148" y="78" text-anchor="middle" fill="#3b82f6" font-size="11" opacity="0.8">root → target</text>
  <text x="412" y="78" text-anchor="middle" fill="#f97316" font-size="11" opacity="0.8">target → root</text>

  <!-- Pointer fires both -->
  <circle cx="280" cy="284" r="14" fill="none" stroke="#00f0ff" stroke-width="2"/>
  <circle cx="280" cy="284" r="5" fill="#00f0ff"/>
  <text x="280" y="314" text-anchor="middle" fill="#64748b" font-size="12">pointer event originates here</text>
  <line x1="280" y1="270" x2="280" y2="236" stroke="#00f0ff" stroke-width="1.5" stroke-dasharray="4 3"/>
</svg>
