<svg viewBox="0 0 860 540" xmlns="http://www.w3.org/2000/svg" font-family="'Inter', system-ui, sans-serif">
  <defs>
    <clipPath id="card-clip">
      <rect x="0" y="0" width="860" height="540" rx="16"/>
    </clipPath>
  </defs>

  <!-- Background canvas -->
  <rect width="860" height="540" fill="#0b0f19" rx="16" clip-path="url(#card-clip)"/>
  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="860" height="540" fill="url(#grid)"/>

  <!-- Title -->
  <text x="430" y="36" fill="#4b5563" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="1.5">COMPONENT GALLERY — @vectojs/ui</text>

  <!-- ===== LEFT COLUMN (x=40) ===== -->

  <!-- Button (default) -->
  <rect x="40" y="56" width="120" height="38" rx="8" fill="#2563eb"/>
  <text x="100" y="80" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">Save Draft</text>
  <text x="100" y="106" fill="#4b5563" font-size="10" text-anchor="middle">Button (default)</text>

  <!-- Button (hovered) -->
  <rect x="176" y="56" width="120" height="38" rx="8" fill="#3b82f6"/>
  <rect x="176" y="56" width="120" height="38" rx="8" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="236" y="80" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">Publish</text>
  <text x="236" y="106" fill="#4b5563" font-size="10" text-anchor="middle">Button (hover)</text>

  <!-- Text component -->
  <rect x="40" y="126" width="380" height="90" rx="8" fill="rgba(15,23,42,0.4)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="56" y="155" fill="#f1f5f9" font-size="20" font-weight="700">The quick brown fox</text>
  <text x="56" y="180" fill="#94a3b8" font-size="14">Jumps over the lazy dog. Text wraps at maxWidth.</text>
  <text x="56" y="205" fill="#64748b" font-size="11">Text — multi-line, wrapping, RTL-aware</text>

  <!-- Input -->
  <rect x="40" y="234" width="260" height="40" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="50" y="259" fill="#64748b" font-size="13">your@email.com</text>
  <text x="40" y="290" fill="#4b5563" font-size="10">Input (placeholder)</text>

  <!-- Input (focused with caret) -->
  <rect x="312" y="234" width="110" height="40" rx="6" fill="#0f172a" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="322" y="259" fill="#e2e8f0" font-size="13">Hello</text>
  <line x1="357" y1="243" x2="357" y2="266" stroke="#e2e8f0" stroke-width="1.5" opacity="0.8"/>
  <text x="312" y="290" fill="#4b5563" font-size="10">Input (focused)</text>

  <!-- Slider -->
  <rect x="40" y="310" width="250" height="6" rx="3" fill="#1e293b"/>
  <rect x="40" y="310" width="140" height="6" rx="3" fill="#6366f1"/>
  <circle cx="180" cy="313" r="10" fill="#6366f1" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="40" y="340" fill="#4b5563" font-size="10">Slider — value=56%</text>

  <!-- Toggle (on) -->
  <rect x="40" y="360" width="44" height="24" rx="12" fill="#6366f1"/>
  <circle cx="56" cy="372" r="10" fill="#fff"/>
  <text x="96" y="377" fill="#e2e8f0" font-size="12">Dark Mode</text>
  <text x="40" y="400" fill="#4b5563" font-size="10">Toggle (on)</text>

  <!-- Toggle (off) -->
  <rect x="200" y="360" width="44" height="24" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <circle cx="212" cy="372" r="10" fill="#94a3b8"/>
  <text x="256" y="377" fill="#94a3b8" font-size="12">Notifications</text>
  <text x="200" y="400" fill="#4b5563" font-size="10">Toggle (off)</text>

  <!-- Checkbox -->
  <rect x="40" y="420" width="18" height="18" rx="4" fill="#2563eb"/>
  <path d="M44,429 l4,4 l8,-8" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  <text x="66" y="433" fill="#e2e8f0" font-size="12">Subscribe to updates</text>

  <rect x="40" y="448" width="18" height="18" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="66" y="461" fill="#94a3b8" font-size="12">I agree to terms</text>
  <text x="40" y="486" fill="#4b5563" font-size="10">Checkbox — checked / unchecked</text>

  <!-- ===== RIGHT COLUMN (x=460) ===== -->

  <!-- Card -->
  <rect x="460" y="56" width="380" height="160" rx="12" fill="#0f172a" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="476" y="84" fill="#f1f5f9" font-size="14" font-weight="600">Statistics Card</text>
  <text x="476" y="104" fill="#64748b" font-size="11">Monthly active users</text>
  <text x="476" y="136" fill="#38bdf8" font-size="28" font-weight="700">124,892</text>
  <text x="476" y="158" fill="#10b981" font-size="12">↑ 18.4% from last month</text>
  <rect x="680" y="70" width="80" height="28" rx="6" fill="rgba(99,102,241,0.15)"/>
  <text x="720" y="88" fill="#a5b4fc" font-size="11" text-anchor="middle">Export</text>
  <text x="460" y="230" fill="#4b5563" font-size="10">Card — background panel with children</text>

  <!-- ScrollView mockup -->
  <rect x="460" y="250" width="380" height="180" rx="10" fill="#0f172a" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Clip mask for scroll items -->
  <defs>
    <clipPath id="scroll-clip">
      <rect x="460" y="250" width="380" height="180" rx="10"/>
    </clipPath>
  </defs>
  <g clip-path="url(#scroll-clip)">
    <rect x="472" y="262" width="356" height="44" rx="8" fill="rgba(30,41,59,0.6)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="486" y="283" fill="#f1f5f9" font-size="12" font-weight="500">Message 1 — Alice at 09:41</text>
    <text x="486" y="299" fill="#64748b" font-size="11">How's the canvas rendering going?</text>

    <rect x="472" y="314" width="356" height="44" rx="8" fill="rgba(30,41,59,0.6)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="486" y="335" fill="#f1f5f9" font-size="12" font-weight="500">Message 2 — Bob at 09:42</text>
    <text x="486" y="351" fill="#64748b" font-size="11">Perfect! 200k entities at 60fps ✓</text>

    <rect x="472" y="366" width="356" height="44" rx="8" fill="rgba(30,41,59,0.6)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="486" y="387" fill="#f1f5f9" font-size="12" font-weight="500">Message 3 — Alice at 09:43</text>
    <text x="486" y="403" fill="#64748b" font-size="11">Ship it 🚀</text>
  </g>
  <!-- Scrollbar -->
  <rect x="832" y="262" width="4" height="168" rx="2" fill="rgba(255,255,255,0.04)"/>
  <rect x="832" y="262" width="4" height="60" rx="2" fill="rgba(255,255,255,0.15)"/>
  <text x="460" y="446" fill="#4b5563" font-size="10">ScrollView — spring-physics scroll, wheel + drag</text>

  <!-- Dropdown -->
  <rect x="460" y="464" width="200" height="38" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="474" y="487" fill="#e2e8f0" font-size="13">Medium</text>
  <text x="640" y="487" fill="#94a3b8" font-size="12">▾</text>
  <text x="460" y="516" fill="#4b5563" font-size="10">Dropdown (closed)</text>

  <!-- Dropdown open -->
  <rect x="672" y="452" width="168" height="78" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <rect x="672" y="452" width="168" height="26" rx="8" fill="rgba(99,102,241,0.15)"/>
  <text x="688" y="469" fill="#a5b4fc" font-size="12" font-weight="500">Small</text>
  <text x="688" y="495" fill="#e2e8f0" font-size="12">Medium</text>
  <text x="688" y="519" fill="#94a3b8" font-size="12">Large</text>
  <text x="672" y="540" fill="#4b5563" font-size="10">Dropdown (open)</text>
</svg>
