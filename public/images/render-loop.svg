<svg viewBox="0 0 820 220" xmlns="http://www.w3.org/2000/svg" font-family="'Inter', system-ui, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6366f1"/>
    </marker>
  </defs>

  <rect width="820" height="220" fill="#0a0e1a" rx="12"/>

  <!-- rAF entry pill -->
  <rect x="16" y="84" width="148" height="36" rx="18" fill="#1a1f35" stroke="#6366f1" stroke-width="1.5"/>
  <text x="90" y="107" fill="#a5b4fc" font-size="11.5" font-weight="600" text-anchor="middle">requestAnimationFrame</text>

  <!-- Arrow rAF → loop box -->
  <line x1="164" y1="102" x2="183" y2="102" stroke="#6366f1" stroke-width="2" marker-end="url(#arr)"/>

  <!-- "for each entity" outer box -->
  <rect x="185" y="14" width="450" height="176" rx="10" fill="#0d1525" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="410" y="32" fill="#475569" font-size="10" font-weight="600" text-anchor="middle" letter-spacing="1">FOR EACH ENTITY</text>

  <!-- 5 inner steps, left-to-right -->
  <!-- 1. update -->
  <rect x="198" y="44" width="74" height="52" rx="7" fill="#1a1f35" stroke="#38bdf8" stroke-width="1.2"/>
  <text x="235" y="63" fill="#7dd3fc" font-size="10" font-weight="600" text-anchor="middle">update()</text>
  <text x="235" y="77" fill="#4b5563" font-size="9" text-anchor="middle">dt in ms</text>
  <text x="235" y="89" fill="#4b5563" font-size="9" text-anchor="middle">tweens · physics</text>

  <line x1="272" y1="70" x2="286" y2="70" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 2. getBounds -->
  <rect x="288" y="44" width="74" height="52" rx="7" fill="#1a1f35" stroke="#38bdf8" stroke-width="1.2"/>
  <text x="325" y="63" fill="#7dd3fc" font-size="10" font-weight="600" text-anchor="middle">getBounds()</text>
  <text x="325" y="77" fill="#4b5563" font-size="9" text-anchor="middle">skip if</text>
  <text x="325" y="89" fill="#4b5563" font-size="9" text-anchor="middle">offscreen</text>

  <line x1="362" y1="70" x2="376" y2="70" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 3. transform -->
  <rect x="378" y="44" width="74" height="52" rx="7" fill="#1a1f35" stroke="#38bdf8" stroke-width="1.2"/>
  <text x="415" y="60" fill="#7dd3fc" font-size="10" font-weight="600" text-anchor="middle">save</text>
  <text x="415" y="73" fill="#4b5563" font-size="9" text-anchor="middle">translate</text>
  <text x="415" y="84" fill="#4b5563" font-size="9" text-anchor="middle">scale · rotate</text>

  <line x1="452" y1="70" x2="466" y2="70" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 4. render -->
  <rect x="468" y="44" width="74" height="52" rx="7" fill="#1a1f35" stroke="#38bdf8" stroke-width="1.2"/>
  <text x="505" y="63" fill="#7dd3fc" font-size="10" font-weight="600" text-anchor="middle">render()</text>
  <text x="505" y="77" fill="#4b5563" font-size="9" text-anchor="middle">IRenderer</text>
  <text x="505" y="89" fill="#4b5563" font-size="9" text-anchor="middle">draw calls</text>

  <line x1="542" y1="70" x2="556" y2="70" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 5. restore -->
  <rect x="558" y="44" width="66" height="52" rx="7" fill="#1a1f35" stroke="#38bdf8" stroke-width="1.2"/>
  <text x="591" y="70" fill="#7dd3fc" font-size="10" font-weight="600" text-anchor="middle">restore</text>

  <!-- Loop end → flush -->
  <line x1="635" y1="102" x2="653" y2="102" stroke="#6366f1" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Flush batch box -->
  <rect x="655" y="72" width="72" height="60" rx="8" fill="#1a1f35" stroke="#6366f1" stroke-width="1.2"/>
  <text x="691" y="90" fill="#a5b4fc" font-size="9.5" font-weight="600" text-anchor="middle">Flush</text>
  <text x="691" y="103" fill="#4b5563" font-size="9" text-anchor="middle">WebGL batch</text>
  <text x="691" y="115" fill="#4b5563" font-size="9" text-anchor="middle">draws</text>

  <line x1="727" y1="102" x2="741" y2="102" stroke="#6366f1" stroke-width="2" marker-end="url(#arr)"/>

  <!-- syncA11y box -->
  <rect x="743" y="72" width="65" height="60" rx="8" fill="#1a1f35" stroke="#10b981" stroke-width="1.2"/>
  <text x="775" y="90" fill="#6ee7b7" font-size="9.5" font-weight="600" text-anchor="middle">syncA11y()</text>
  <text x="775" y="103" fill="#4b5563" font-size="9" text-anchor="middle">shadow DOM</text>
  <text x="775" y="115" fill="#4b5563" font-size="9" text-anchor="middle">positions</text>

  <!-- Loop-back arrow (visual iteration indicator) -->
  <path d="M 410 190 C 410 206, 280 206, 280 175" fill="none" stroke="#334155" stroke-width="1.2" stroke-dasharray="3,3"/>
  <text x="410" y="210" fill="#374151" font-size="9" text-anchor="middle">repeats for every entity in the tree</text>

</svg>
